name: Refresh dataset

on:
  schedule:
    # 매일 23:00 UTC (= 다음날 08:00 KST). FRED·SPY 일일 데이터 발표 이후.
    - cron: '0 23 * * *'
  workflow_dispatch:        # 수동 실행 허용

permissions:
  contents: write           # 봇이 CSV 변경을 커밋·푸시할 수 있게

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install -r requirements-refresh.txt

      - name: Run refresh
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python refresh_dataset.py

      - name: Commit if CSV changed
        run: |
          if [[ -n "$(git status --porcelain Deep/data/sp500_regime_dataset_final.csv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Deep/data/sp500_regime_dataset_final.csv
            git commit -m "chore: 데이터셋 자동 갱신 ($(date -u +%Y-%m-%d))"
            git push
            echo "Pushed updated CSV"
          else
            echo "No CSV changes today, skipping commit"
          fi
